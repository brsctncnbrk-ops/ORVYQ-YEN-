name: ORVYQ Final Encode

# Encode-only (task section 17, hardened per the follow-up task's section 8).
# This workflow must NEVER regenerate any creative data -- no music
# resolution, no audio mix, no edit plan, no captions, no footage/evidence
# selection, no candidate build, no derive-configs/build-project, no creative
# script of any kind. It downloads the exact immutable render bundle a human
# already approved off the "ORVYQ Full-Length Candidate Review" run named in
# approved_review_run_id (including the fully assembled render_ready_project
# SOURCE, used as-is), verifies every hash, and re-encodes the SAME candidate
# at the 1080p final profile. If review and final ever produce different
# frames, captions, or audio, that is this workflow's own bug, not an
# acceptable outcome -- see scripts/orvyq_review_final_parity.mjs.
#
# This workflow must NEVER run automatically and must NEVER be triggered
# without an explicit human approval already committed to the repository
# (qa/proof_approval.json, verified by scripts/orvyq_verify_approval.mjs).
on:
  workflow_dispatch:
    inputs:
      quality_control_approved:
        description: "Human has reviewed and approved the FULL-LENGTH review artifact referenced by qa/proof_approval.json"
        type: boolean
        default: false
      approved_review_run_id:
        description: "orvyq-review.yml run ID that produced the approved full-length review artifact and render bundle"
        type: string
        required: true

permissions:
  contents: read
  actions: read

concurrency:
  group: orvyq-final-encode
  cancel-in-progress: false

env:
  PROJECT_ID: 001-the-ai-race-no-one-can-afford-to-win
  FINAL_WIDTH: "1920"
  FINAL_HEIGHT: "1080"
  FINAL_CRF: "16"

jobs:
  final-encode:
    if: ${{ inputs.quality_control_approved == true && inputs.approved_review_run_id != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact source
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cheapest possible check, before touching any artifact: the approval
      # record itself (qa/proof_approval.json, committed to the repo by an
      # explicit human action -- see docs/canonical-candidate-audit.md
      # section 6) is present, approved, and names the review run given as
      # this workflow's own input. frozen_candidate.json is NOT committed to
      # the branch (task follow-up section 6) -- it only ever exists inside
      # the review run's render bundle artifact, so it isn't available yet
      # at this point; the candidate_hash/render_bundle_hash comparison
      # against it happens in the next step, right after downloading it.
      - name: Verify an approval record exists and names this review run
        run: |
          set -euo pipefail
          test -s "projects/$PROJECT_ID/qa/proof_approval.json"
          node -e "
            const approval = require('./projects/$PROJECT_ID/qa/proof_approval.json');
            if (approval.approved !== true) { console.error('qa/proof_approval.json.approved is not true.'); process.exit(1); }
            if (approval.review_run_id !== '${{ inputs.approved_review_run_id }}') {
              console.error('qa/proof_approval.json.review_run_id (' + approval.review_run_id + ') does not match the run id given as input (${{ inputs.approved_review_run_id }}).');
              process.exit(1);
            }
          "

      # ---- download the exact immutable render bundle the review run produced ----
      # No creative script runs here -- these are the literal bytes a human
      # already reviewed in the full-length review artifact, including the
      # fully assembled render_ready_project SOURCE (used as-is below; this
      # workflow never runs derive-configs or build-project).
      - name: Download the approved render bundle
        uses: actions/download-artifact@v4
        with:
          name: orvyq-render-bundle-${{ inputs.approved_review_run_id }}
          path: render-bundle
          run-id: ${{ inputs.approved_review_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Place the downloaded render bundle into the project tree
        run: |
          set -euo pipefail
          SRC="render-bundle/projects/$PROJECT_ID"
          DEST="projects/$PROJECT_ID"
          mkdir -p "$DEST/direction" "$DEST/remotion" "$DEST/assets/audio" "$DEST/assets/music" "$DEST/assets/sfx" "$DEST/qa"
          cp "$SRC/direction/edit_plan.json" "$DEST/direction/edit_plan.json"
          cp "$SRC/remotion/captions.json" "$DEST/remotion/captions.json"
          cp "$SRC/assets/asset_registry.json" "$DEST/assets/asset_registry.json"
          cp "$SRC/assets/audio/final_mix.mp3" "$DEST/assets/audio/final_mix.mp3"
          cp "$SRC/assets/audio/final_mix.metadata.json" "$DEST/assets/audio/final_mix.metadata.json"
          cp "$SRC/assets/music/approved_bed.mp3" "$DEST/assets/music/approved_bed.mp3"
          cp "$SRC/assets/music/approved_bed.provenance.json" "$DEST/assets/music/approved_bed.provenance.json"
          cp "$SRC"/assets/sfx/*.wav "$DEST/assets/sfx/" 2>/dev/null || true
          cp "$SRC/qa/frozen_candidate.json" "$DEST/qa/frozen_candidate.json"
          cp "$SRC/qa/review_render_manifest.json" review_render_manifest.json
          # The fully assembled render_ready_project SOURCE -- reused as-is,
          # never rebuilt via derive-configs/build-project.
          rm -rf "$DEST/remotion/render_ready_project"
          cp -r "$SRC/remotion/render_ready_project" "$DEST/remotion/render_ready_project"

      # ---- verify the approval matches THIS candidate, and every hash matches the real placed files ----
      - name: Verify the approval matches this render bundle's candidate
        run: node scripts/orvyq_verify_approval.mjs --project-id="$PROJECT_ID" --mode=full --stage=early --approved-review-run-id="${{ inputs.approved_review_run_id }}"

      - name: Verify all downloaded creative file hashes match the placed frozen candidate
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const crypto = require('crypto');
            const dir = 'projects/$PROJECT_ID';
            const candidate = JSON.parse(fs.readFileSync(dir + '/qa/frozen_candidate.json', 'utf8'));
            const identity = candidate.canonical_candidate_identity;
            const sha256 = (p) => crypto.createHash('sha256').update(fs.readFileSync(p)).digest('hex');
            const checks = [
              ['edit_plan_hash', dir + '/direction/edit_plan.json'],
              ['caption_hash', dir + '/remotion/captions.json'],
              ['audio_mix_metadata_hash', dir + '/assets/audio/final_mix.metadata.json'],
              ['asset_registry_hash', dir + '/assets/asset_registry.json'],
              ['final_mix_audio_hash', dir + '/assets/audio/final_mix.mp3'],
              ['music_bed_hash', dir + '/assets/music/approved_bed.mp3']
            ];
            let failed = false;
            for (const [field, file] of checks) {
              const expected = identity[field];
              if (!expected) continue;
              const actual = sha256(file);
              if (actual !== expected) { console.error('HASH MISMATCH for ' + field + ': expected ' + expected + ', got ' + actual + ' (' + file + ')'); failed = true; }
            }
            if (failed) process.exit(1);
            console.log('All downloaded creative file hashes match the frozen candidate.');
          "

      - name: Materialize real footage from the pinned source commit (asset fetch only -- no creative selection)
        run: node scripts/orvyq_materialize_footage.mjs --project-id="$PROJECT_ID"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install media tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      # Recomputes hashes from the now-placed files (including a fresh hash
      # of the placed render_ready_project directory) and confirms every one
      # still matches the committed, human-approved frozen_candidate.json --
      # NOT by regenerating any creative output, only by re-hashing what was
      # downloaded and placed above.
      - name: Verify the placed candidate still matches the approved frozen candidate
        run: node scripts/orvyq_verify_approval.mjs --project-id="$PROJECT_ID" --stage=late

      # No derive-configs, no build-project: the render_ready_project
      # directory placed above IS the frozen render bundle's own copy.
      - name: Install Remotion dependencies and type-check (no source regeneration)
        working-directory: projects/${{ env.PROJECT_ID }}/remotion/render_ready_project
        run: |
          npm ci --no-audit --no-fund
          npx tsc --noEmit

      - name: Resolve browser executable
        run: |
          set -euo pipefail
          BROWSER="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium-browser || command -v chromium || true)"
          test -n "$BROWSER"
          echo "FACTFORGE_REMOTION_BROWSER_EXECUTABLE=$BROWSER" >> "$GITHUB_ENV"

      # ---- encode the SAME candidate at 1080p final quality ----
      # No --frames flag: the full candidate, exactly as reviewed. Only
      # resolution/CRF differ from the review encode. No post-render
      # "repair" step of any kind -- see orvyq-review.yml's own note on why
      # an asymmetric post-process would break parity.
      - name: Render full candidate at final quality
        working-directory: projects/${{ env.PROJECT_ID }}/remotion/render_ready_project
        run: npx remotion render src/index.ts FactForgeVideo out/final_video.mp4 --codec=h264 --crf="$FINAL_CRF"

      - name: Compute final video sha256
        run: |
          set -euo pipefail
          echo "FINAL_VIDEO_SHA256=$(sha256sum "projects/$PROJECT_ID/remotion/render_ready_project/out/final_video.mp4" | cut -d' ' -f1)" >> "$GITHUB_ENV"

      - name: Write final render manifest (for review/final parity verification)
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const candidate = JSON.parse(fs.readFileSync('projects/$PROJECT_ID/qa/frozen_candidate.json', 'utf8'));
            const identity = candidate.canonical_candidate_identity;
            const manifest = {
              schema_version: '2.0',
              identity: {
                candidate_hash: candidate.candidate_hash,
                render_bundle_hash: candidate.render_bundle_hash,
                edit_plan_hash: identity.edit_plan_hash,
                caption_hash: identity.caption_hash,
                final_mix_audio_hash: identity.final_mix_audio_hash || null,
                audio_mix_metadata_hash: identity.audio_mix_metadata_hash,
                asset_manifest_hash: identity.asset_manifest_hash || null,
                render_ready_source_hash: identity.render_ready_source_hash || null,
                renderer_source_hash: identity.renderer_source_tree_hash || null,
                total_frames: identity.total_frames,
                fps: identity.fps,
                frame_range: identity.selected_render_range
              },
              encode: { profile: 'final', width: Number(process.env.FINAL_WIDTH), height: Number(process.env.FINAL_HEIGHT), codec: 'h264', bitrate: null, crf: Number(process.env.FINAL_CRF), encoder_preset: null },
              artifact: {
                run_id: '${{ github.run_id }}',
                video_path: 'out/final_video.mp4',
                video_sha256: process.env.FINAL_VIDEO_SHA256
              }
            };
            fs.writeFileSync('projects/$PROJECT_ID/qa/final_render_manifest.json', JSON.stringify(manifest, null, 2));
            console.log(JSON.stringify(manifest, null, 2));
          "

      # ---- hard parity gate: review and final must be the same candidate ----
      - name: Verify review/final parity (must fail on ANY creative-identity difference)
        run: node scripts/orvyq_review_final_parity.mjs --review-manifest review_render_manifest.json --final-manifest "projects/$PROJECT_ID/qa/final_render_manifest.json" --report "projects/$PROJECT_ID/qa/review_final_parity.json"

      - name: Run post-render media QA
        run: |
          set +e
          node scripts/orvyq_media_qa.mjs --project-id "$PROJECT_ID" --video "projects/$PROJECT_ID/remotion/render_ready_project/out/final_video.mp4" --report "projects/$PROJECT_ID/qa/orvyq_full_media_qa.json" > media-qa.log 2>&1
          echo $? > media-qa.status
          cat media-qa.log
          exit 0

      - name: Copy to output
        run: |
          set -euo pipefail
          mkdir -p "projects/$PROJECT_ID/output"
          cp "projects/$PROJECT_ID/remotion/render_ready_project/out/final_video.mp4" "projects/$PROJECT_ID/output/final_video.mp4"
          {
            echo "Rendered at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Workflow run: ${{ github.run_id }}"
            echo "Approved review run: ${{ inputs.approved_review_run_id }}"
            echo "Source commit: ${{ github.sha }}"
          } > "projects/$PROJECT_ID/output/render_log.txt"

      # MP4 uploaded regardless of media QA's result (task section 17 step 8).
      - name: Upload final render (before/regardless of media QA result)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orvyq-final-render-${{ github.run_id }}
          retention-days: 30
          path: |
            projects/${{ env.PROJECT_ID }}/output/final_video.mp4
            projects/${{ env.PROJECT_ID }}/output/render_log.txt
          if-no-files-found: error

      - name: Upload final QA reports (separate artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orvyq-final-qa-reports-${{ github.run_id }}
          retention-days: 30
          path: |
            projects/${{ env.PROJECT_ID }}/qa/*.json
            media-qa.log
            media-qa.status

      - name: Stop when post-render media QA failed
        run: test "$(cat media-qa.status)" = "0"
