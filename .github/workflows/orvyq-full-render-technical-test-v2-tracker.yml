name: Track ORVYQ Full Render Technical Test v2

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/orvyq-full-render-technical-test-v2-tracker.yml"

permissions:
  actions: read
  contents: write

jobs:
  record-latest-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Query latest technical-test v2 run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          API="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/workflows/orvyq-full-render-technical-test-v2.yml/runs?per_page=5"
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$API" > runs.json
          jq '{checked_at: (now | todateiso8601), workflow_runs: [.workflow_runs[] | {id, name, status, conclusion, event, head_branch, head_sha, run_number, run_attempt, created_at, updated_at, html_url}]}' runs.json > full-render-technical-test-v2-status.json
          cat full-render-technical-test-v2-status.json

      - name: Commit status snapshot
        run: |
          set -euo pipefail
          git config user.name "orvyq-test-tracker"
          git config user.email "orvyq-test-tracker@users.noreply.github.com"
          git add full-render-technical-test-v2-status.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update full-render technical-test v2 status [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
