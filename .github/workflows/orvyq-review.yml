name: ORVYQ Full-Length Candidate Review

# Renders the ENTIRE canonical candidate (motion hook + full narration/pauses
# + end card -- no truncation to any short cut) at a review encode profile.
# There is no separate "proof" creative mode anymore: review and the later
# final encode are the exact same candidate, differing only in resolution/
# bitrate at render time -- see docs/canonical-candidate-audit.md.
#
# This workflow does NOT build the candidate. Every creative/build step
# (materialize, shot plan, edit plan, music, audio mix, captions, asset
# registry, render-ready build, typecheck, freeze) runs exactly once, in
# "ORVYQ Candidate Validation" (.github/workflows/orvyq-candidate-validation.yml).
# This workflow requires the run ID of an already-successful validation run
# for THIS EXACT source commit as an input, verifies that claim for real
# against the GitHub Actions API (not just a comment saying so), downloads
# that run's immutable orvyq-validated-candidate-bundle artifact UNCHANGED,
# verifies every file's hash against the bundle's own frozen_candidate.json,
# and renders that bundle exactly as downloaded -- so "validation candidate
# == review candidate" is a real, code-enforced guarantee, not a convention.
#
# This workflow NEVER commits or pushes anything back to the branch and
# never runs any of orvyq_full_production_plan.mjs / orvyq_edit_plan.mjs /
# orvyq_music_resolve.mjs / orvyq_audio_mix.mjs / orvyq_caption_build.mjs /
# orvyq_asset_registry.mjs / remotion_build.mjs derive-configs|build-project.
#
# workflow_dispatch only, deliberately: this workflow renders the entire
# candidate and is comparatively expensive/slow, and must only ever be
# triggered once "ORVYQ Candidate Validation" is green for this exact
# commit -- see docs/canonical-candidate-audit.md.
on:
  workflow_dispatch:
    inputs:
      approved_validation_run_id:
        description: "Successful ORVYQ Candidate Validation run ID for this exact source commit"
        type: string
        required: true

permissions:
  contents: read
  actions: read

concurrency:
  group: orvyq-review-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: 001-the-ai-race-no-one-can-afford-to-win
  # 1280x720 preferred; render-time --scale on the same 1920x1080
  # composition, never a different composition or timeline.
  REVIEW_SCALE: "0.6667"
  REVIEW_BITRATE: "6M"
  REVIEW_WIDTH: "1280"
  REVIEW_HEIGHT: "720"

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact source
        uses: actions/checkout@v4

      - name: Lock exact source commit
        run: |
          set -euo pipefail
          ACTUAL_SHA="$(git rev-parse HEAD)"
          test "$ACTUAL_SHA" = "$GITHUB_SHA"
          printf '%s\n' "$ACTUAL_SHA" | tee render-source-sha.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ---- code-enforced validation gate (not just a documented convention) ----
      # Confirms, against the real GitHub Actions API: the named run is
      # actually a run of orvyq-candidate-validation.yml, it actually
      # concluded "success", it ran on this same branch, and -- the part a
      # human clicking a button could get wrong -- it validated this EXACT
      # source commit, not an earlier one. Any mismatch hard-fails before
      # anything is downloaded.
      - name: Verify the named Candidate Validation run is real, successful, and matches this exact commit
        uses: actions/github-script@v7
        with:
          script: |
            const runId = ${{ inputs.approved_validation_run_id }};
            const { data: run } = await github.rest.actions.getWorkflowRun({ owner: context.repo.owner, repo: context.repo.repo, run_id: runId });
            const currentBranch = context.ref.replace(/^refs\/heads\//, "");
            const failures = [];
            if (!run.path || !run.path.endsWith("orvyq-candidate-validation.yml")) failures.push(`run ${runId} is workflow "${run.path}", not orvyq-candidate-validation.yml`);
            if (run.conclusion !== "success") failures.push(`run ${runId} conclusion is "${run.conclusion}", not "success"`);
            if (run.head_branch !== currentBranch) failures.push(`run ${runId} ran on branch "${run.head_branch}", this workflow is running on "${currentBranch}"`);
            if (run.head_sha !== context.sha) failures.push(`run ${runId} validated source commit ${run.head_sha}, this workflow is running at ${context.sha} -- the candidate has changed since that validation run; re-validate before reviewing`);
            if (failures.length) core.setFailed(failures.join("; "));
            else core.info(`Validation run ${runId} verified: path=${run.path}, conclusion=success, branch=${run.head_branch}, sha=${run.head_sha}`);

      # ---- download the exact immutable bundle Candidate Validation produced ----
      # No creative script runs here -- these are the literal bytes
      # Candidate Validation already built, QA'd, and froze, including the
      # fully assembled render_ready_project SOURCE (used as-is below; this
      # workflow never runs derive-configs or build-project).
      - name: Download the validated candidate bundle
        uses: actions/download-artifact@v4
        with:
          name: orvyq-validated-candidate-bundle-${{ inputs.approved_validation_run_id }}
          path: candidate-bundle
          run-id: ${{ inputs.approved_validation_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify the bundle's source SHA matches this exact commit
        run: |
          set -euo pipefail
          BUNDLE_SHA="$(cat candidate-bundle/validation-source-sha.txt)"
          test "$BUNDLE_SHA" = "$GITHUB_SHA"

      - name: Place the downloaded candidate bundle into the project tree
        run: |
          set -euo pipefail
          SRC="candidate-bundle/projects/$PROJECT_ID"
          DEST="projects/$PROJECT_ID"
          mkdir -p "$DEST/direction" "$DEST/remotion" "$DEST/assets/audio" "$DEST/assets/music" "$DEST/assets/sfx" "$DEST/qa"
          cp "$SRC/direction/edit_plan.json" "$DEST/direction/edit_plan.json"
          cp "$SRC/remotion/captions.json" "$DEST/remotion/captions.json"
          cp "$SRC/assets/asset_registry.json" "$DEST/assets/asset_registry.json"
          cp "$SRC/assets/audio/final_mix.mp3" "$DEST/assets/audio/final_mix.mp3"
          cp "$SRC/assets/audio/final_mix.metadata.json" "$DEST/assets/audio/final_mix.metadata.json"
          cp "$SRC/assets/music/approved_bed.mp3" "$DEST/assets/music/approved_bed.mp3"
          cp "$SRC/assets/music/approved_bed.provenance.json" "$DEST/assets/music/approved_bed.provenance.json"
          cp "$SRC"/assets/sfx/*.wav "$DEST/assets/sfx/" 2>/dev/null || true
          cp "$SRC/qa/frozen_candidate.json" "$DEST/qa/frozen_candidate.json"
          rm -rf "$DEST/remotion/render_ready_project"
          cp -r "$SRC/remotion/render_ready_project" "$DEST/remotion/render_ready_project"

      - name: Verify every downloaded file's hash matches the bundle's own frozen candidate (no rebuild, integrity only)
        run: node scripts/orvyq_verify_bundle_integrity.mjs --project-id="$PROJECT_ID"

      - name: Resolve the candidate duration (single timeline source, from the placed edit plan)
        run: |
          set -euo pipefail
          node -e "
            const p = require('./projects/$PROJECT_ID/direction/edit_plan.json');
            const motionHook = require('./projects/$PROJECT_ID/direction/motion_hook.json');
            const hookDuration = motionHook.shots.reduce((s, x) => s + x.duration, 0);
            console.log('CANDIDATE_DURATION_SECONDS=' + (p.duration_frames / p.fps));
            console.log('HOOK_DURATION_SECONDS=' + hookDuration);
          " | tee -a "$GITHUB_ENV"

      # No derive-configs, no build-project: the render_ready_project
      # directory placed above IS the validated bundle's own copy.
      - name: Install Remotion dependencies and type-check (no source regeneration)
        working-directory: projects/${{ env.PROJECT_ID }}/remotion/render_ready_project
        run: |
          npm ci --no-audit --no-fund
          npx tsc --noEmit

      - name: Resolve browser executable
        run: |
          set -euo pipefail
          BROWSER="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium-browser || command -v chromium || true)"
          test -n "$BROWSER"
          echo "FACTFORGE_REMOTION_BROWSER_EXECUTABLE=$BROWSER" >> "$GITHUB_ENV"
          "$BROWSER" --version

      # ---- render the FULL film at review profile ----
      # No --frames flag: the entire candidate renders, every time. --scale
      # only changes output pixel dimensions (1920*0.6667 ~= 1280x720); it
      # does not touch the composition's timeline data, captions, or any
      # creative content. No watermark, no "proof" text overlay. No
      # post-render brightness "repair" step -- see docs/canonical-candidate-audit.md
      # for why an asymmetric review-only post-process (applied here but
      # never in the final encode workflow) would itself have broken review/
      # final parity.
      - name: Render the full candidate at review quality
        working-directory: projects/${{ env.PROJECT_ID }}/remotion/render_ready_project
        run: |
          set +e
          npx remotion render src/index.ts FactForgeVideo out/orvyq_review.mp4 \
            --codec=h264 --scale="$REVIEW_SCALE" --video-bitrate="$REVIEW_BITRATE" --concurrency=1 --image-format=png \
            2>&1 | tee out/review_render_stdout.txt
          RENDER_EXIT=${PIPESTATUS[0]}
          set -e
          if [ "$RENDER_EXIT" -ne 0 ]; then
            echo "::warning::remotion render exited $RENDER_EXIT; verifying the output file directly"
          fi
          test -s out/orvyq_review.mp4
          DURATION="$(ffprobe -v error -show_entries format=duration -of default=nk=1:nw=1 out/orvyq_review.mp4)"
          echo "Rendered duration: ${DURATION}s (expected full candidate duration: ${CANDIDATE_DURATION_SECONDS}s)"
          python3 -c "
          import sys
          d = float('$DURATION')
          expected = float('$CANDIDATE_DURATION_SECONDS')
          sys.exit(0 if abs(d - expected) < 1.0 else 1)
          " || { echo "::error::rendered duration ${DURATION}s is not within 1s of the full candidate duration ${CANDIDATE_DURATION_SECONDS}s -- a partial/short cut is not an acceptable review render"; exit 1; }

      - name: Compute review video sha256
        run: |
          set -euo pipefail
          echo "REVIEW_VIDEO_SHA256=$(sha256sum "projects/$PROJECT_ID/remotion/render_ready_project/out/orvyq_review.mp4" | cut -d' ' -f1)" >> "$GITHUB_ENV"

      # ---- write the review render manifest ----
      # identity/encode/artifact schema -- `identity` must match the final
      # encode's manifest exactly; `encode`/`artifact` are expected to
      # differ and are never compared.
      - name: Write review render manifest (for review/final parity verification)
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const candidate = JSON.parse(fs.readFileSync('projects/$PROJECT_ID/qa/frozen_candidate.json', 'utf8'));
            const identity = candidate.canonical_candidate_identity;
            const manifest = {
              schema_version: '2.0',
              identity: {
                candidate_hash: candidate.candidate_hash,
                render_bundle_hash: candidate.render_bundle_hash,
                edit_plan_hash: identity.edit_plan_hash,
                caption_hash: identity.caption_hash,
                final_mix_audio_hash: identity.final_mix_audio_hash || null,
                audio_mix_metadata_hash: identity.audio_mix_metadata_hash,
                asset_manifest_hash: identity.asset_manifest_hash || null,
                render_ready_source_hash: identity.render_ready_source_hash || null,
                renderer_source_hash: identity.renderer_source_tree_hash || null,
                total_frames: identity.total_frames,
                fps: identity.fps,
                frame_range: identity.selected_render_range
              },
              encode: { profile: 'review', width: Number(process.env.REVIEW_WIDTH), height: Number(process.env.REVIEW_HEIGHT), codec: 'h264', bitrate: process.env.REVIEW_BITRATE, crf: null, encoder_preset: null },
              artifact: {
                run_id: '${{ github.run_id }}',
                validated_by_run_id: '${{ inputs.approved_validation_run_id }}',
                video_path: 'out/orvyq_review.mp4',
                video_sha256: process.env.REVIEW_VIDEO_SHA256
              }
            };
            fs.writeFileSync('projects/$PROJECT_ID/qa/review_render_manifest.json', JSON.stringify(manifest, null, 2));
            console.log(JSON.stringify(manifest, null, 2));
          "

      # The final encode-only workflow (orvyq-final-encode.yml) downloads
      # THIS run's own render-bundle artifact by convention -- re-uploaded
      # here unchanged (byte-for-byte the same files just placed above,
      # this workflow never rebuilds them) so that convention keeps working
      # without final-encode needing to know a validation run ID exists.
      - name: Re-upload the validated bundle as this run's own render bundle (unchanged, never rebuilt)
        uses: actions/upload-artifact@v4
        with:
          name: orvyq-render-bundle-${{ github.run_id }}
          retention-days: 90
          path: |
            projects/${{ env.PROJECT_ID }}/qa/frozen_candidate.json
            projects/${{ env.PROJECT_ID }}/qa/review_render_manifest.json
            projects/${{ env.PROJECT_ID }}/direction/edit_plan.json
            projects/${{ env.PROJECT_ID }}/remotion/captions.json
            projects/${{ env.PROJECT_ID }}/assets/asset_registry.json
            projects/${{ env.PROJECT_ID }}/assets/audio/final_mix.mp3
            projects/${{ env.PROJECT_ID }}/assets/audio/final_mix.metadata.json
            projects/${{ env.PROJECT_ID }}/assets/music/approved_bed.mp3
            projects/${{ env.PROJECT_ID }}/assets/music/approved_bed.provenance.json
            projects/${{ env.PROJECT_ID }}/assets/sfx/*.wav
            projects/${{ env.PROJECT_ID }}/remotion/render_ready_project/**
            !projects/${{ env.PROJECT_ID }}/remotion/render_ready_project/node_modules
            !projects/${{ env.PROJECT_ID }}/remotion/render_ready_project/out
            !projects/${{ env.PROJECT_ID }}/remotion/render_ready_project/.remotion

      # ---- upload the review MP4 BEFORE post-render QA ----
      - name: Upload review render (before media QA -- must survive a media QA failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orvyq-full-length-review-${{ github.run_id }}
          retention-days: 30
          path: |
            projects/${{ env.PROJECT_ID }}/remotion/render_ready_project/out/orvyq_review.mp4
            projects/${{ env.PROJECT_ID }}/remotion/render_ready_project/out/review_render_stdout.txt
          if-no-files-found: error

      # ---- post-render QA ----
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install media and speech tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          python -m pip install --disable-pip-version-check faster-whisper==1.2.0 requests==2.32.5

      - name: Verify speech in rendered review
        run: python scripts/orvyq_speech_qa.py --project-id "$PROJECT_ID" --media "projects/$PROJECT_ID/remotion/render_ready_project/out/orvyq_review.mp4" --output-name speech_transcript.json

      - name: Run post-render media QA with diagnostics
        run: |
          set +e
          node scripts/orvyq_media_qa.mjs --project-id "$PROJECT_ID" --video "projects/$PROJECT_ID/remotion/render_ready_project/out/orvyq_review.mp4" --report "projects/$PROJECT_ID/qa/orvyq_review_media_qa.json" > media-qa.log 2>&1
          echo $? > media-qa.status
          cat media-qa.log
          exit 0

      - name: Run near-black audit against the rendered review
        run: |
          set +e
          node scripts/orvyq_near_black_audit.mjs --project-id "$PROJECT_ID" --video "projects/$PROJECT_ID/remotion/render_ready_project/out/orvyq_review.mp4" > near-black.log 2>&1
          echo $? > near-black.status
          cat near-black.log
          exit 0

      - name: Create visual and mobile review sheets
        if: always()
        run: |
          set -euo pipefail
          VIDEO="projects/$PROJECT_ID/remotion/render_ready_project/out/orvyq_review.mp4"
          OUT="projects/$PROJECT_ID/remotion/render_ready_project/out"
          if [ -f "$VIDEO" ]; then
            MOBILE_INTERVAL="$(python3 -c "print(max(0.1, $CANDIDATE_DURATION_SECONDS / 30))")"
            CONTACT_INTERVAL="$(python3 -c "print(max(0.1, $CANDIDATE_DURATION_SECONDS / 50))")"
            ffmpeg -hide_banner -nostats -y -i "$VIDEO" -vf "fps=1/${MOBILE_INTERVAL},scale=320:-1,tile=5x6" -frames:v 1 "$OUT/orvyq_mobile_review_sheet.jpg"
            ffmpeg -hide_banner -nostats -y -i "$VIDEO" -vf "fps=1/${CONTACT_INTERVAL},scale=640:-1,tile=5x10" -frames:v 1 "$OUT/orvyq_quality_control_contact_sheet.jpg"
            ffprobe -v error -show_format -show_streams -print_format json "$VIDEO" > "$OUT/orvyq_quality_control_probe.json"
          fi

      - name: Upload candidate manifest and QA reports (separate artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orvyq-review-qa-reports-${{ github.run_id }}
          retention-days: 30
          path: |
            projects/${{ env.PROJECT_ID }}/qa/*.json
            projects/${{ env.PROJECT_ID }}/remotion/render_ready_project/out/*.jpg
            projects/${{ env.PROJECT_ID }}/remotion/render_ready_project/out/*.json
            projects/${{ env.PROJECT_ID }}/assets/audio/final_mix.metadata.json
            projects/${{ env.PROJECT_ID }}/assets/music/approved_bed.provenance.json
            projects/${{ env.PROJECT_ID }}/remotion/captions.json
            projects/${{ env.PROJECT_ID }}/direction/edit_plan.json
            media-qa.log
            media-qa.status
            near-black.log
            near-black.status
          if-no-files-found: warn

      - name: Stop when post-render media QA or near-black audit failed
        run: |
          set -euo pipefail
          test "$(cat media-qa.status)" = "0"
          test "$(cat near-black.status)" = "0"
