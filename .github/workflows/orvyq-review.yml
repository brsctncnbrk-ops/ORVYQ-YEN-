name: ORVYQ Full-Length Candidate Review

# Renders the ENTIRE canonical candidate (motion hook + full narration/pauses
# + end card -- no truncation to any short cut) at a review encode profile.
# There is no separate "proof" creative mode anymore: review and the later
# final encode are the exact same candidate, differing only in resolution/
# bitrate at render time -- see docs/canonical-candidate-audit.md and task
# section 16. A short proof clip, a selected-scene montage, or any partial
# cut is not an acceptable output of this workflow.
#
# This workflow NEVER commits or pushes anything back to the branch (fixed
# after a real run showed the bot-commit pattern moves HEAD mid-pipeline and
# entangles candidate identity with an unrelated commit -- see
# docs/canonical-candidate-audit.md). Every generated file (regenerated shot
# list, edit plan, audio mix, captions, asset registry, frozen candidate,
# render-ready project) lives only on this runner's filesystem and in the
# artifacts uploaded at the end. Checkout happens once, at one immutable
# source commit, and that commit never changes for the rest of the run.
#
# workflow_dispatch only, deliberately: this workflow renders the entire
# candidate and is comparatively expensive/slow. "ORVYQ Candidate
# Validation" (.github/workflows/orvyq-candidate-validation.yml) is the fast,
# cheap gate that runs automatically on every push/PR (the same pre-render
# pipeline plus the full QA/test suite, no render); this workflow must only
# ever be triggered once that gate is green, never automatically alongside
# it -- see docs/canonical-candidate-audit.md.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: orvyq-review-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: 001-the-ai-race-no-one-can-afford-to-win
  # 1280x720 preferred (task section 16); render-time --scale on the same
  # 1920x1080 composition, never a different composition or timeline.
  REVIEW_SCALE: "0.6667"
  REVIEW_BITRATE: "6M"
  REVIEW_WIDTH: "1280"
  REVIEW_HEIGHT: "720"

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact source
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Lock exact source commit
        run: |
          set -euo pipefail
          ACTUAL_SHA="$(git rev-parse HEAD)"
          test "$ACTUAL_SHA" = "$GITHUB_SHA"
          printf '%s\n' "$ACTUAL_SHA" | tee render-source-sha.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Materialize real footage and evidence from the pinned source commit
        run: node scripts/orvyq_materialize_footage.mjs --project-id="$PROJECT_ID"

      - name: Verify narration was not overwritten by footage materialization
        run: test -s "projects/$PROJECT_ID/assets/audio/final_voice.mp3"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install media, PDF and speech tooling
        run: |
          set -euo pipefail
          npm ci
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg poppler-utils
          python -m pip install --disable-pip-version-check faster-whisper==1.2.0 requests==2.32.5

      # ---- 1. build the canonical shot plan (never committed back) ----
      - name: Build the canonical full production shot list from real data
        run: node scripts/orvyq_full_production_plan.mjs --project-id="$PROJECT_ID"

      - name: Validate canonical schemas and recovered project data
        run: npm run validate:canonical

      - name: Fetch and verify official primary evidence
        run: node scripts/orvyq_fetch_primary_evidence.mjs

      # ---- 2. build edit plan (full length, no truncation) ----
      - name: Build the canonical candidate edit plan (full length, no truncation)
        run: node scripts/orvyq_edit_plan.mjs --project-id="$PROJECT_ID" --mode=full

      - name: Resolve the canonical candidate duration (single timeline source)
        run: |
          set -euo pipefail
          node -e "
            const p = require('./projects/$PROJECT_ID/direction/edit_plan.json');
            const motionHook = require('./projects/$PROJECT_ID/direction/motion_hook.json');
            const hookDuration = motionHook.shots.reduce((s, x) => s + x.duration, 0);
            console.log('CANDIDATE_DURATION_SECONDS=' + (p.duration_frames / p.fps));
            console.log('HOOK_DURATION_SECONDS=' + hookDuration);
          " | tee -a "$GITHUB_ENV"

      - name: Resolve canonical music (no network)
        run: node scripts/orvyq_music_resolve.mjs --project-id="$PROJECT_ID" --mode=full --target-duration-seconds="$CANDIDATE_DURATION_SECONDS"

      # ---- 3. build the final audio mix ----
      # Full paused narration + leading hook-silence + trailing end-card
      # room, sized to the exact same candidate_duration_frames the video
      # timeline uses -- never a separately-resolved "proof" soundtrack
      # (task section 5/13).
      - name: Build the full candidate narration/music mix
        run: node scripts/orvyq_audio_mix.mjs --project-id="$PROJECT_ID" --mode=candidate --duration-seconds="$CANDIDATE_DURATION_SECONDS" --head-silence-seconds="$HOOK_DURATION_SECONDS"

      - name: Verify narration and capture diagnostics
        run: |
          set +e
          python scripts/orvyq_speech_qa.py --project-id "$PROJECT_ID" > narration-qa.log 2>&1
          echo $? > narration-qa.status
          cat narration-qa.log
          exit 0

      - name: Upload narration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orvyq-narration-diagnostics-${{ github.run_id }}
          path: |
            render-source-sha.txt
            narration-qa.log
            narration-qa.status
            projects/${{ env.PROJECT_ID }}/qa/speech_transcript.json
            projects/${{ env.PROJECT_ID }}/assets/audio/final_mix.metadata.json
            projects/${{ env.PROJECT_ID }}/assets/music/approved_bed.mp3
            projects/${{ env.PROJECT_ID }}/assets/music/approved_bed.provenance.json
            projects/${{ env.PROJECT_ID }}/assets/sfx/*.wav
            projects/${{ env.PROJECT_ID }}/assets/evidence/primary_evidence.runtime.json
          if-no-files-found: warn
          retention-days: 7

      - name: Stop when narration verification failed
        run: test "$(cat narration-qa.status)" = "0"

      # ---- 4. build captions ----
      - name: Build canonical captions
        run: node scripts/orvyq_caption_build.mjs --project-id="$PROJECT_ID"

      # ---- 5. build asset registry ----
      - name: Build canonical asset registry
        run: node scripts/orvyq_asset_registry.mjs --project-id="$PROJECT_ID"

      # ---- 6. build render-ready project ----
      - name: Build render-ready project
        run: |
          set -euo pipefail
          node scripts/remotion_build.mjs derive-configs --project-id="$PROJECT_ID"
          node scripts/remotion_build.mjs build-project --project-id="$PROJECT_ID"

      # ---- 7. typecheck render-ready project ----
      - name: Install Remotion dependencies and type-check
        working-directory: projects/${{ env.PROJECT_ID }}/remotion/render_ready_project
        run: |
          npm ci --no-audit --no-fund
          npx tsc --noEmit

      # ---- 8+9+10. hash render-ready + freeze the candidate + pre-render QA ----
      # Freeze happens AFTER the render-ready project is built and
      # typechecked, so render_ready_source_hash reflects what will actually
      # be rendered -- not a pre-build guess (task follow-up section 7).
      - name: Compute frozen candidate manifest (after render-ready build)
        run: |
          node scripts/orvyq_frozen_candidate.mjs --project-id="$PROJECT_ID"
          echo "--- frozen_candidate.json ---"
          cat "projects/$PROJECT_ID/qa/frozen_candidate.json"

      - name: Run full pre-render QA chain (creative + technical)
        run: npm run orvyq:qa

      - name: Resolve browser executable
        run: |
          set -euo pipefail
          BROWSER="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium-browser || command -v chromium || true)"
          test -n "$BROWSER"
          echo "FACTFORGE_REMOTION_BROWSER_EXECUTABLE=$BROWSER" >> "$GITHUB_ENV"
          "$BROWSER" --version

      # ---- 11. render the FULL film at review profile ----
      # No --frames flag: the entire candidate renders, every time. --scale
      # only changes output pixel dimensions (1920*0.6667 ~= 1280x720); it
      # does not touch the composition's timeline data, captions, or any
      # creative content. No watermark, no "proof" text overlay. No
      # post-render brightness "repair" step -- see docs/canonical-candidate-audit.md
      # for why an asymmetric review-only post-process (applied here but
      # never in the final encode workflow) would itself have broken review/
      # final parity.
      - name: Render the full candidate at review quality
        working-directory: projects/${{ env.PROJECT_ID }}/remotion/render_ready_project
        run: |
          set +e
          npx remotion render src/index.ts FactForgeVideo out/orvyq_review.mp4 \
            --codec=h264 --scale="$REVIEW_SCALE" --video-bitrate="$REVIEW_BITRATE" --concurrency=1 --image-format=png \
            2>&1 | tee out/review_render_stdout.txt
          RENDER_EXIT=${PIPESTATUS[0]}
          set -e
          if [ "$RENDER_EXIT" -ne 0 ]; then
            echo "::warning::remotion render exited $RENDER_EXIT; verifying the output file directly"
          fi
          test -s out/orvyq_review.mp4
          DURATION="$(ffprobe -v error -show_entries format=duration -of default=nk=1:nw=1 out/orvyq_review.mp4)"
          echo "Rendered duration: ${DURATION}s (expected full candidate duration: ${CANDIDATE_DURATION_SECONDS}s)"
          python3 -c "
          import sys
          d = float('$DURATION')
          expected = float('$CANDIDATE_DURATION_SECONDS')
          sys.exit(0 if abs(d - expected) < 1.0 else 1)
          " || { echo "::error::rendered duration ${DURATION}s is not within 1s of the full candidate duration ${CANDIDATE_DURATION_SECONDS}s -- a partial/short cut is not an acceptable review render"; exit 1; }

      - name: Compute review video sha256
        run: |
          set -euo pipefail
          echo "REVIEW_VIDEO_SHA256=$(sha256sum "projects/$PROJECT_ID/remotion/render_ready_project/out/orvyq_review.mp4" | cut -d' ' -f1)" >> "$GITHUB_ENV"

      # ---- 12. write the review render manifest ----
      # New identity/encode/artifact schema (task follow-up section 4) --
      # `identity` must match the final encode's manifest exactly;
      # `encode`/`artifact` are expected to differ and are never compared.
      - name: Write review render manifest (for review/final parity verification)
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const candidate = JSON.parse(fs.readFileSync('projects/$PROJECT_ID/qa/frozen_candidate.json', 'utf8'));
            const identity = candidate.canonical_candidate_identity;
            const manifest = {
              schema_version: '2.0',
              identity: {
                candidate_hash: candidate.candidate_hash,
                render_bundle_hash: candidate.render_bundle_hash,
                edit_plan_hash: identity.edit_plan_hash,
                caption_hash: identity.caption_hash,
                final_mix_audio_hash: identity.final_mix_audio_hash || null,
                audio_mix_metadata_hash: identity.audio_mix_metadata_hash,
                asset_manifest_hash: identity.asset_manifest_hash || null,
                render_ready_source_hash: identity.render_ready_source_hash || null,
                renderer_source_hash: identity.renderer_source_tree_hash || null,
                total_frames: identity.total_frames,
                fps: identity.fps,
                frame_range: identity.selected_render_range
              },
              encode: { profile: 'review', width: Number(process.env.REVIEW_WIDTH), height: Number(process.env.REVIEW_HEIGHT), codec: 'h264', bitrate: process.env.REVIEW_BITRATE, crf: null, encoder_preset: null },
              artifact: {
                run_id: '${{ github.run_id }}',
                video_path: 'out/orvyq_review.mp4',
                video_sha256: process.env.REVIEW_VIDEO_SHA256
              }
            };
            fs.writeFileSync('projects/$PROJECT_ID/qa/review_render_manifest.json', JSON.stringify(manifest, null, 2));
            console.log(JSON.stringify(manifest, null, 2));
          "

      # The final encode-only workflow (orvyq-final-encode.yml) must never
      # regenerate edit_plan.json/captions/audio mix/asset registry/render-
      # ready project itself (task section 17) -- those are gitignored,
      # always-regenerate build output that is never committed to the branch
      # (see above), so the ONLY way the final workflow can avoid
      # regenerating them is to download the exact frozen bytes THIS run
      # just produced -- including the fully assembled render_ready_project
      # SOURCE (not rebuilt, just reused), so the final workflow never runs
      # derive-configs/build-project either.
      - name: Upload the immutable render bundle (consumed by the final encode-only workflow)
        uses: actions/upload-artifact@v4
        with:
          name: orvyq-render-bundle-${{ github.run_id }}
          retention-days: 90
          path: |
            projects/${{ env.PROJECT_ID }}/qa/frozen_candidate.json
            projects/${{ env.PROJECT_ID }}/qa/review_render_manifest.json
            projects/${{ env.PROJECT_ID }}/direction/edit_plan.json
            projects/${{ env.PROJECT_ID }}/remotion/captions.json
            projects/${{ env.PROJECT_ID }}/assets/asset_registry.json
            projects/${{ env.PROJECT_ID }}/assets/audio/final_mix.mp3
            projects/${{ env.PROJECT_ID }}/assets/audio/final_mix.metadata.json
            projects/${{ env.PROJECT_ID }}/assets/music/approved_bed.mp3
            projects/${{ env.PROJECT_ID }}/assets/music/approved_bed.provenance.json
            projects/${{ env.PROJECT_ID }}/assets/sfx/*.wav
            projects/${{ env.PROJECT_ID }}/remotion/render_ready_project/**
            !projects/${{ env.PROJECT_ID }}/remotion/render_ready_project/node_modules
            !projects/${{ env.PROJECT_ID }}/remotion/render_ready_project/out
            !projects/${{ env.PROJECT_ID }}/remotion/render_ready_project/.remotion

      # ---- 13. upload the review MP4 BEFORE post-render QA ----
      - name: Upload review render (before media QA -- must survive a media QA failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orvyq-full-length-review-${{ github.run_id }}
          retention-days: 30
          path: |
            projects/${{ env.PROJECT_ID }}/remotion/render_ready_project/out/orvyq_review.mp4
            projects/${{ env.PROJECT_ID }}/remotion/render_ready_project/out/review_render_stdout.txt
          if-no-files-found: error

      # ---- 14. post-render QA ----
      - name: Verify speech in rendered review
        run: python scripts/orvyq_speech_qa.py --project-id "$PROJECT_ID" --media "projects/$PROJECT_ID/remotion/render_ready_project/out/orvyq_review.mp4" --output-name speech_transcript.json

      - name: Run post-render media QA with diagnostics
        run: |
          set +e
          node scripts/orvyq_media_qa.mjs --project-id "$PROJECT_ID" --video "projects/$PROJECT_ID/remotion/render_ready_project/out/orvyq_review.mp4" --report "projects/$PROJECT_ID/qa/orvyq_review_media_qa.json" > media-qa.log 2>&1
          echo $? > media-qa.status
          cat media-qa.log
          exit 0

      - name: Run near-black audit against the rendered review
        run: |
          set +e
          node scripts/orvyq_near_black_audit.mjs --project-id "$PROJECT_ID" --video "projects/$PROJECT_ID/remotion/render_ready_project/out/orvyq_review.mp4" > near-black.log 2>&1
          echo $? > near-black.status
          cat near-black.log
          exit 0

      - name: Create visual and mobile review sheets
        if: always()
        run: |
          set -euo pipefail
          VIDEO="projects/$PROJECT_ID/remotion/render_ready_project/out/orvyq_review.mp4"
          OUT="projects/$PROJECT_ID/remotion/render_ready_project/out"
          if [ -f "$VIDEO" ]; then
            MOBILE_INTERVAL="$(python3 -c "print(max(0.1, $CANDIDATE_DURATION_SECONDS / 30))")"
            CONTACT_INTERVAL="$(python3 -c "print(max(0.1, $CANDIDATE_DURATION_SECONDS / 50))")"
            ffmpeg -hide_banner -nostats -y -i "$VIDEO" -vf "fps=1/${MOBILE_INTERVAL},scale=320:-1,tile=5x6" -frames:v 1 "$OUT/orvyq_mobile_review_sheet.jpg"
            ffmpeg -hide_banner -nostats -y -i "$VIDEO" -vf "fps=1/${CONTACT_INTERVAL},scale=640:-1,tile=5x10" -frames:v 1 "$OUT/orvyq_quality_control_contact_sheet.jpg"
            ffprobe -v error -show_format -show_streams -print_format json "$VIDEO" > "$OUT/orvyq_quality_control_probe.json"
          fi

      - name: Upload candidate manifest and QA reports (separate artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orvyq-review-qa-reports-${{ github.run_id }}
          retention-days: 30
          path: |
            projects/${{ env.PROJECT_ID }}/qa/*.json
            projects/${{ env.PROJECT_ID }}/remotion/render_ready_project/out/*.jpg
            projects/${{ env.PROJECT_ID }}/remotion/render_ready_project/out/*.json
            projects/${{ env.PROJECT_ID }}/assets/audio/final_mix.metadata.json
            projects/${{ env.PROJECT_ID }}/assets/music/approved_bed.provenance.json
            projects/${{ env.PROJECT_ID }}/remotion/captions.json
            projects/${{ env.PROJECT_ID }}/direction/edit_plan.json
            media-qa.log
            media-qa.status
            near-black.log
            near-black.status
          if-no-files-found: warn

      - name: Stop when post-render media QA or near-black audit failed
        run: |
          set -euo pipefail
          test "$(cat media-qa.status)" = "0"
          test "$(cat near-black.status)" = "0"
