name: ORVYQ Vendor Proof Music

# One-off maintenance workflow: fetches the real, already-licensed proof
# music track (Scott Buckley, "Signal to Noise", CC BY 4.0 -- the exact same
# source page/URL/license/attribution scripts/orvyq_fetch_music.mjs has
# always used) from its real third-party host, verifies it with the same
# checks orvyq-proof.yml already relies on, and commits it into this repo
# under Git LFS (.gitattributes already routes *.mp3 through the LFS clean
# filter) as a canonical local asset. This exists because the proof
# workflow's own live fetch of that same URL failed twice in a row on
# transient network errors (UND_ERR_CONNECT_TIMEOUT) even with retries, and
# because this session's own sandbox egress policy blocks both the music
# host and GitHub's LFS/blob-storage hosts directly -- a GitHub-hosted
# runner (unrestricted network) is the only place that can fetch the real
# bytes and commit them. This does not change the track, its license, its
# attribution, or its verification -- it only gives normal CI a copy that
# doesn't depend on scottbuckley.com.au being reachable at render time.
on:
  push:
    branches:
      - "claude/orvyq-rebuild-canonical-udc3rx"
    paths:
      - ".github/workflows/orvyq-vendor-proof-music.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: orvyq-vendor-proof-music
  cancel-in-progress: false

env:
  PROJECT_ID: 001-the-ai-race-no-one-can-afford-to-win
  CANONICAL_ASSET_PATH: projects/001-the-ai-race-no-one-can-afford-to-win/assets/music/licensed/sb_signaltonoise.mp3

jobs:
  vendor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install ffmpeg (duration verification)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      # Reuses the exact existing fetch+verify logic (source URL, license,
      # size/duration checks) unmodified -- this workflow does not implement
      # its own separate download or verification path.
      - name: Fetch and verify the real licensed proof music
        run: node scripts/orvyq_fetch_music.mjs --project-id="$PROJECT_ID" --min-duration-seconds=150

      - name: Vendor the verified track as a canonical local asset
        run: |
          set -euo pipefail
          SRC_DIR="projects/$PROJECT_ID/assets/music"
          mkdir -p "$(dirname "$CANONICAL_ASSET_PATH")"
          cp "$SRC_DIR/approved_bed.mp3" "$CANONICAL_ASSET_PATH"
          SHA256="$(sha256sum "$CANONICAL_ASSET_PATH" | cut -d' ' -f1)"
          echo "Canonical asset SHA-256: $SHA256"
          node -e "
            const fs = require('fs');
            const provenance = JSON.parse(fs.readFileSync('$SRC_DIR/approved_bed.provenance.json', 'utf8'));
            provenance.vendored_asset = '$CANONICAL_ASSET_PATH';
            provenance.vendored_at = new Date().toISOString();
            provenance.vendored_reason = 'Committed as a canonical local Git LFS asset after scottbuckley.com.au became transiently unreachable from the proof workflow runner (see .github/workflows/orvyq-vendor-proof-music.yml).';
            fs.writeFileSync('${CANONICAL_ASSET_PATH}.provenance.json', JSON.stringify(provenance, null, 2) + '\n');
          "
          echo "--- ${CANONICAL_ASSET_PATH}.provenance.json ---"
          cat "${CANONICAL_ASSET_PATH}.provenance.json"

      - name: Commit the canonical asset to the branch
        run: |
          set -euo pipefail
          git config user.name "orvyq-vendor-bot"
          git config user.email "orvyq-vendor-bot@users.noreply.github.com"
          git add -f "$CANONICAL_ASSET_PATH" "${CANONICAL_ASSET_PATH}.provenance.json"
          if git diff --cached --quiet; then
            echo "Canonical asset unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "Vendor the licensed proof music track as a canonical local asset [skip ci]"
          git stash push --include-untracked --message "orvyq-vendor-bot: local build artifacts" || true
          git pull --rebase origin "${{ github.ref_name }}"
          git push origin "HEAD:${{ github.ref_name }}"
          git stash pop || true
