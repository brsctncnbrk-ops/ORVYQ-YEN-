name: ORVYQ Proof Render

# Renders a duration-limited execution of the SAME canonical renderer used
# for the full film -- see docs/migration-plan.md. Proof mode is a
# --frames=<range> CLI selection against direction/edit_plan.json's own
# frame_range, computed from the canonical edit plan itself; there is no
# separate proof composition, plan format, or renderer.
on:
  workflow_dispatch:
  pull_request:
  # GitHub only lets workflow_dispatch target a workflow already indexed on
  # the default branch or triggered by a real event -- this repo's default
  # branch has no workflows yet and this task should not open a PR unasked.
  # Scoping push to the development branch (matching the golden repo's own
  # PR-into-a-designated-branch pattern) lets the proof run automatically as
  # work lands here, without touching main.
  push:
    branches:
      - "claude/orvyq-rebuild-canonical-udc3rx"

permissions:
  contents: read

concurrency:
  group: orvyq-proof-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: 001-the-ai-race-no-one-can-afford-to-win
  # The exact golden reference this proof is reproduced from -- see
  # docs/source-audit.md section 1.
  GOLDEN_REPO: brsctncnbrk-ops/YouTube_pepline
  GOLDEN_REF: 9affbd2494d8197a564c4a552b879fadb0e14a4a

jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact source
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Lock exact source commit
        run: |
          set -euo pipefail
          ACTUAL_SHA="$(git rev-parse HEAD)"
          test "$ACTUAL_SHA" = "$GITHUB_SHA"
          printf '%s\n' "$ACTUAL_SHA" | tee render-source-sha.txt

      # This session's own environment cannot push footage/narration binaries
      # to this repo (its egress policy blocks lfs.github.com entirely -- see
      # docs/source-audit.md section 4 and the Phase 5 report). GitHub-hosted
      # runners have no such restriction, so the proof workflow recovers the
      # real, one-time-curated footage and narration directly from the public
      # golden reference repository at the exact commit that produced the
      # approved historical proof. This step is specific to reproducing THAT
      # historical proof; a genuinely new project would supply its own
      # final_voice.mp3 (human-recorded) and footage (via the acquisition
      # pipeline) committed to this repo instead.
      - name: Recover real footage and narration from the golden reference
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GOLDEN_REPO }}
          ref: ${{ env.GOLDEN_REF }}
          lfs: true
          path: golden-reference
          sparse-checkout: |
            projects/001-the-ai-race-no-one-can-afford-to-win/assets/footage
            projects/001-the-ai-race-no-one-can-afford-to-win/assets/audio
          sparse-checkout-cone-mode: false

      - name: Stage golden footage and narration into the canonical project
        run: |
          set -euo pipefail
          SRC="golden-reference/projects/$PROJECT_ID"
          DST="projects/$PROJECT_ID"
          mkdir -p "$DST/assets/footage" "$DST/assets/audio"
          cp "$SRC"/assets/footage/*.mp4 "$DST/assets/footage/"
          cp "$SRC"/assets/footage/*.provenance.json "$DST/assets/footage/"
          cp "$SRC/assets/audio/final_voice.mp3" "$DST/assets/audio/final_voice.mp3"
          rm -rf golden-reference
          test -s "$DST/assets/audio/final_voice.mp3"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install media, PDF and speech tooling
        run: |
          set -euo pipefail
          npm ci
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg poppler-utils
          python -m pip install --disable-pip-version-check faster-whisper==1.2.0 requests==2.32.5

      - name: Validate canonical schemas and recovered project data
        run: npm run validate:canonical

      - name: Fetch and verify official primary evidence
        run: node scripts/orvyq_fetch_primary_evidence.mjs

      - name: Fetch licensed proof music
        run: node scripts/orvyq_fetch_music.mjs --project-id="$PROJECT_ID" --min-duration-seconds=150

      - name: Build paused narration, music and restrained sound design
        run: node scripts/orvyq_audio_mix.mjs --project-id="$PROJECT_ID" --mode=proof --duration-seconds=150 --narration-limit-seconds=114.2

      - name: Verify narration and capture diagnostics
        run: |
          set +e
          python scripts/orvyq_speech_qa.py --project-id "$PROJECT_ID" --max-seconds 150 > narration-qa.log 2>&1
          echo $? > narration-qa.status
          cat narration-qa.log
          exit 0

      - name: Upload narration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orvyq-narration-diagnostics-${{ github.run_id }}
          path: |
            render-source-sha.txt
            narration-qa.log
            narration-qa.status
            projects/${{ env.PROJECT_ID }}/qa/speech_transcript.json
            projects/${{ env.PROJECT_ID }}/assets/audio/final_mix.metadata.json
            projects/${{ env.PROJECT_ID }}/assets/music/approved_bed.mp3
            projects/${{ env.PROJECT_ID }}/assets/music/approved_bed.provenance.json
            projects/${{ env.PROJECT_ID }}/assets/sfx/*.wav
            projects/${{ env.PROJECT_ID }}/assets/evidence/primary_evidence.runtime.json
          if-no-files-found: warn
          retention-days: 7

      - name: Stop when narration verification failed
        run: test "$(cat narration-qa.status)" = "0"

      - name: Build canonical proof edit plan
        run: node scripts/orvyq_edit_plan.mjs --project-id="$PROJECT_ID" --mode=proof

      - name: Build canonical captions
        run: node scripts/orvyq_caption_build.mjs --project-id="$PROJECT_ID"

      - name: Build canonical asset registry
        run: node scripts/orvyq_asset_registry.mjs --project-id="$PROJECT_ID"

      - name: Run physical evidence, semantic, pacing, mobile and music audits
        run: npm run orvyq:audits

      - name: Build render-ready project
        run: |
          set -euo pipefail
          node scripts/remotion_build.mjs derive-configs --project-id="$PROJECT_ID"
          node scripts/remotion_build.mjs build-project --project-id="$PROJECT_ID"

      - name: Run editorial and provenance checks with diagnostics
        run: |
          set +e
          node scripts/orvyq_edit_plan_tests.mjs > editorial.log 2>&1
          echo $? > editorial-qa.status
          node scripts/orvyq_license_audit.mjs > license.log 2>&1
          echo $? > license-qa.status
          node scripts/orvyq_alignment_score.mjs > alignment.log 2>&1
          echo $? > alignment-qa.status
          echo "--- edit plan tests ---"; cat editorial.log
          echo "--- license audit ---"; cat license.log
          echo "--- alignment score ---"; cat alignment.log
          exit 0

      - name: Upload editorial diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orvyq-editorial-diagnostics-${{ github.run_id }}
          path: |
            render-source-sha.txt
            editorial.log
            editorial-qa.status
            license.log
            license-qa.status
            alignment.log
            alignment-qa.status
            projects/${{ env.PROJECT_ID }}/research/primary_evidence_manifest.json
            projects/${{ env.PROJECT_ID }}/assets/evidence/primary_evidence.runtime.json
            projects/${{ env.PROJECT_ID }}/qa/*.json
            projects/${{ env.PROJECT_ID }}/assets/asset_registry.json
            projects/${{ env.PROJECT_ID }}/remotion/captions.json
            projects/${{ env.PROJECT_ID }}/direction/edit_plan.json
          if-no-files-found: warn
          retention-days: 7

      - name: Stop when pre-render quality gates failed
        run: |
          set -euo pipefail
          test "$(cat editorial-qa.status)" = "0"
          test "$(cat license-qa.status)" = "0"
          test "$(cat alignment-qa.status)" = "0"

      - name: Install Remotion dependencies and type-check
        working-directory: projects/${{ env.PROJECT_ID }}/remotion/render_ready_project
        run: |
          npm ci --no-audit --no-fund
          npx tsc --noEmit

      - name: Resolve browser executable
        run: |
          set -euo pipefail
          BROWSER="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium-browser || command -v chromium || true)"
          test -n "$BROWSER"
          echo "FACTFORGE_REMOTION_BROWSER_EXECUTABLE=$BROWSER" >> "$GITHUB_ENV"
          "$BROWSER" --version

      - name: Resolve proof frame range from the canonical edit plan
        run: |
          set -euo pipefail
          RANGE="$(node -e "const p=require('./projects/$PROJECT_ID/direction/edit_plan.json'); console.log(p.frame_range.start_frame+'-'+(p.frame_range.end_frame-1))")"
          echo "PROOF_FRAME_RANGE=$RANGE" >> "$GITHUB_ENV"
          echo "Rendering frames $RANGE"

      - name: Render proof range
        working-directory: projects/${{ env.PROJECT_ID }}/remotion/render_ready_project
        run: |
          npx remotion render src/index.ts FactForgeVideo out/orvyq_cinematic_proof_150s.mp4 \
            --codec=h264 --frames="$PROOF_FRAME_RANGE" --concurrency=1 --image-format=png \
            2>&1 | tee out/proof_render_stdout.txt

      - name: Repair isolated renderer brightness corruption
        run: node scripts/orvyq_brightness_repair.mjs --project-id="$PROJECT_ID" --video="projects/$PROJECT_ID/remotion/render_ready_project/out/orvyq_cinematic_proof_150s.mp4"

      - name: Verify speech in rendered proof
        run: python scripts/orvyq_speech_qa.py --project-id "$PROJECT_ID" --media "projects/$PROJECT_ID/remotion/render_ready_project/out/orvyq_cinematic_proof_150s.mp4" --max-seconds 150 --output-name speech_transcript.json

      - name: Run post-render media QA with diagnostics
        run: |
          set +e
          node scripts/orvyq_media_qa.mjs --project-id "$PROJECT_ID" --video "projects/$PROJECT_ID/remotion/render_ready_project/out/orvyq_cinematic_proof_150s.mp4" --report "projects/$PROJECT_ID/qa/orvyq_preview_media_qa.json" > media-qa.log 2>&1
          echo $? > media-qa.status
          cat media-qa.log
          exit 0

      - name: Create visual and mobile review sheets
        if: always()
        run: |
          set -euo pipefail
          VIDEO="projects/$PROJECT_ID/remotion/render_ready_project/out/orvyq_cinematic_proof_150s.mp4"
          OUT="projects/$PROJECT_ID/remotion/render_ready_project/out"
          if [ -f "$VIDEO" ]; then
            ffmpeg -hide_banner -nostats -y -i "$VIDEO" -vf "fps=1,scale=320:-1,tile=5x6" "$OUT/orvyq_mobile_review_sheet.jpg"
            ffmpeg -hide_banner -nostats -y -i "$VIDEO" -vf "fps=1/3,scale=640:-1,tile=5x10" "$OUT/orvyq_quality_control_contact_sheet.jpg"
            ffprobe -v error -show_format -show_streams -print_format json "$VIDEO" > "$OUT/orvyq_quality_control_probe.json"
          fi

      - name: Upload cinematic proof approval and diagnostic package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orvyq-cinematic-proof-150s-${{ github.run_id }}
          retention-days: 14
          path: |
            projects/${{ env.PROJECT_ID }}/remotion/render_ready_project/out/*.mp4
            projects/${{ env.PROJECT_ID }}/remotion/render_ready_project/out/*.jpg
            projects/${{ env.PROJECT_ID }}/remotion/render_ready_project/out/*.json
            projects/${{ env.PROJECT_ID }}/remotion/render_ready_project/out/proof_render_stdout.txt
            media-qa.log
            media-qa.status
            projects/${{ env.PROJECT_ID }}/qa/*.json
            projects/${{ env.PROJECT_ID }}/assets/audio/final_mix.metadata.json
            projects/${{ env.PROJECT_ID }}/assets/music/approved_bed.provenance.json
            projects/${{ env.PROJECT_ID }}/remotion/captions.json
            projects/${{ env.PROJECT_ID }}/direction/edit_plan.json
            projects/${{ env.PROJECT_ID }}/assets/asset_registry.json
          if-no-files-found: warn

      - name: Stop when post-render media QA failed
        run: test "$(cat media-qa.status)" = "0"
